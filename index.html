<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>给你的一个小页面</title>

<style>
body {
  text-align: center;
  font-family: sans-serif;
  margin-top: 80px;
}

.hidden {
  display: none;
}

button {
  padding: 10px 20px;
  margin: 10px;
  cursor: pointer;
}
</style>

<script>
function step1() {
  document.getElementById("s1").classList.remove("hidden");
}

function step2() {
  document.getElementById("s2").classList.remove("hidden");
}

function step3() {
  document.getElementById("s3").classList.remove("hidden");
}

function step4() {
  alert("其实也没什么特别的\n\n只是想让你慢一点\n\n你不用马上好起来");
}
</script>

</head>

<body>

<h2>先别急着关掉</h2>
<p>这个页面不会很长</p>

<button onclick="step1()">那我看一下</button>

<div id="s1" class="hidden">
  <p>刚才有点难受吧</p>
  <button onclick="step2()">再看一点</button>
</div>

<div id="s2" class="hidden">
  <p>不用解释也没关系</p>
  <button onclick="step3()">然后呢</button>
</div>

<div id="s3" class="hidden">
  <p>你可以先什么都不做</p>
  <p>就这样待一会</p>
  <button onclick="step4()">最后一个</button>
</div>

</body>
</html>
