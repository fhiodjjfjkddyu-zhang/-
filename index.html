<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>光影岁月·赠云旭</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #050505; font-family: 'Songti SC', 'SimSun', serif; overflow: hidden; color: #fff; user-select: none; }
        #starfield { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        #ui-layer { position: relative; z-index: 10; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .screen { display: none; flex-direction: column; align-items: center; opacity: 0; transition: opacity 1s ease-in-out; position: absolute; }
        .screen.active { display: flex; opacity: 1; }
        
        /* 按钮与通用样式 */
        .btn { margin: 15px; padding: 15px 40px; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.3); color: #fff; cursor: pointer; border-radius: 5px; backdrop-filter: blur(5px); }
        .btn:hover { background: rgba(255, 255, 255, 0.2); }

        /* 金色渐变文字效果 */
        .gold-gradient-text {
            font-size: 4em; font-weight: bold;
            background: linear-gradient(to right, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 3s infinite linear;
        }
        @keyframes shine { 0% { background-position: 0% 50%; } 100% { background-position: 200% 50%; } }

        /* 罗盘样式 */
        #compass-container { width: 250px; height: 250px; border: 2px dashed #d4af37; border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; transition: transform 4s cubic-bezier(0.1, 0.7, 0.1, 1); }
        
        /* 交互小游戏样式 */
        #prank-box { padding: 40px; background: rgba(255,255,255,0.05); border-radius: 20px; }
        #dodge-btn { position: absolute; padding: 10px 25px; background: #d4af37; border: none; cursor: pointer; border-radius: 5px; }
    </style>
</head>
<body>

    <canvas id="starfield"></canvas>

    <div id="ui-layer">
        <div id="screen1" class="screen active">
            <h1>光影岁月</h1>
            <button class="btn" onclick="switchScreen('screen1','screen2')">进入展览</button>
        </div>

        <div id="screen2" class="screen">
            <div id="compass-container" onclick="spinCompass()">
                <div id="calendar-text">甲子</div>
            </div>
            <p>点击罗盘，开启时空之旅</p>
        </div>

        <div id="screen3" class="screen">
            <div id="prank-box">
                <h2 id="prank-title">准备好接收你的生日感悟了吗？</h2>
                <button id="dodge-btn">点击领取</button>
            </div>
        </div>

        <div id="screen4" class="screen">
            <div class="gold-gradient-text">天降俊哲</div>
            <div style="font-size: 1.5em; color: #d4af37; margin: 20px 0;">包氏云旭，年十九满腹经纶</div>
            <p style="max-width: 500px; line-height: 1.8;">
                “The unexamined life is not worth living.” —— Socrates<br>
                （未经审视的生活是不值得过的。愿你在新的一岁，保持内心的纯粹，在探索中丰盈灵魂。）
            </p>
        </div>
    </div>

    <audio id="bgm" src="b.mp3" preload="auto"></audio>

    <script>
        // 星空与切换逻辑
        const canvas = document.getElementById('starfield');
        const ctx = canvas.getContext('2d');
        let warpSpeed = 1; stars = [];
        
        function initStars() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            for (let i = 0; i < 600; i++) stars.push({x: Math.random()*innerWidth-innerWidth/2, y: Math.random()*innerHeight-innerHeight/2, z: Math.random()*innerWidth});
        }
        function drawStars() {
            ctx.fillStyle = '#050505'; ctx.fillRect(0,0,innerWidth,innerHeight);
            ctx.translate(innerWidth/2, innerHeight/2);
            for(let s of stars) {
                s.z -= warpSpeed; if(s.z <= 0) s.z = innerWidth;
                let sx = s.x / (s.z/innerWidth), sy = s.y / (s.z/innerWidth);
                ctx.fillStyle = '#fff'; ctx.fillRect(sx, sy, 2, 2);
            }
            ctx.translate(-innerWidth/2, -innerHeight/2);
            requestAnimationFrame(drawStars);
        }
        initStars(); drawStars();

        function switchScreen(hide, show) {
            document.getElementById(hide).classList.remove('active');
            setTimeout(() => document.getElementById(show).classList.add('active'), 500);
        }

        // 罗盘逻辑
        function spinCompass() {
            const compass = document.getElementById('compass-container');
            compass.style.transform = "rotate(1440deg)";
            setTimeout(() => switchScreen('screen2', 'screen3'), 4000);
        }

        // 互动逻辑
        const btn = document.getElementById('dodge-btn');
        let count = 0;
        btn.addEventListener('mouseover', () => {
            if(count < 5) {
                btn.style.left = Math.random() * 80 + 'vw';
                btn.style.top = Math.random() * 80 + 'vh';
                count++;
            } else {
                btn.innerText = "领取心意";
            }
        });
        btn.onclick = () => {
            document.getElementById('bgm').play();
            switchScreen('screen3', 'screen4');
        };
    </script>
</body>
</html>
