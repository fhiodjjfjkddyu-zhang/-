<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>给你的一个小页面</title>

<style>
body {
  margin: 0;
  height: 100vh;
  overflow: hidden;
  font-family: sans-serif;
  background: radial-gradient(circle at center, #1a1a2e, #0f3460, #000);
  color: white;
}

/* 星空粒子 */
canvas {
  position: fixed;
  top: 0;
  left: 0;
}

/* 中间卡片 */
.container {
  position: relative;
  z-index: 1;
  max-width: 420px;
  margin: auto;
  top: 50%;
  transform: translateY(-50%);
  text-align: center;
  background: rgba(255,255,255,0.05);
  padding: 30px;
  border-radius: 12px;
  backdrop-filter: blur(10px);
}

/* 动画 */
.hidden {
  opacity: 0;
  transform: translateY(20px);
}

.show {
  opacity: 1;
  transform: translateY(0);
  transition: all 1s ease;
}

/* 按钮 */
button {
  margin-top: 20px;
  padding: 10px 20px;
  border: none;
  background: rgba(255,255,255,0.1);
  color: white;
  border-radius: 8px;
  cursor: pointer;
}

button:hover {
  background: rgba(255,255,255,0.25);
}
</style>

<script>
function show(id) {
  let el = document.getElementById(id);
  el.classList.remove("hidden");
  el.classList.add("show");
}

function ending() {
  document.body.innerHTML = `
  <div style="
    display:flex;
    height:100vh;
    justify-content:center;
    align-items:center;
    text-align:center;
    font-size:20px;
    line-height:1.8;
    padding:40px;
  ">
  有些事情<br><br>
  其实不用现在就想明白<br><br>
  就像现在这个页面<br><br>
  也只是陪你走到这里而已
  </div>
  `;
}

/* 粒子星空 */
window.onload = function() {
  let canvas = document.getElementById("stars");
  let ctx = canvas.getContext("2d");

  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  let stars = [];
  for (let i = 0; i < 100; i++) {
    stars.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      r: Math.random() * 2
    });
  }

  function draw() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle = "white";

    stars.forEach(s => {
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
      ctx.fill();

      s.y += 0.2;
      if (s.y > canvas.height) s.y = 0;
    });

    requestAnimationFrame(draw);
  }

  draw();
}
</script>

</head>

<body>

<canvas id="stars"></canvas>

<div class="container">

<h2 class="show">先别急着关掉</h2>
<p class="show">这个页面确实不会很长</p>

<button onclick="show('s1')">那我就看一下</button>

<div id="s1" class="hidden">
  <p>刚才那一阵<br>大概有点重吧</p>
  <button onclick="show('s2')">嗯…继续</button>
</div>

<div id="s2" class="hidden">
  <p>其实也不一定要说出来</p>
  <p>有些东西<br>说出来反而变形</p>
  <button onclick="show('s3')">那就这样走一会</button>
</div>

<div id="s3" class="hidden">
  <p>你可以什么都不解决</p>
  <p>也可以什么都不决定</p>
  <button onclick="show('s4')">再往前一点</button>
</div>

<div id="s4" class="hidden">
  <p>有时候人不是在“变好”</p>
  <p>只是慢慢不那么用力撑着了</p>
  <button onclick="ending()">最后一步</button>
</div>

</div>

</body>
</html>
