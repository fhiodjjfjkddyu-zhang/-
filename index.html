<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>一点点光</title>

<style>
body {
  margin: 0;
  height: 100vh;
  background: radial-gradient(circle at center, #1a1a2e, #16213e, #000);
  overflow: hidden;
  color: white;
  font-family: sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* 粒子 */
canvas {
  position: fixed;
  top: 0;
  left: 0;
}

/* 卡片 */
.container {
  position: relative;
  z-index: 1;
  max-width: 420px;
  text-align: center;
  background: rgba(255,255,255,0.05);
  padding: 30px;
  border-radius: 12px;
  backdrop-filter: blur(10px);
  animation: fadeIn 1s ease;
}

@keyframes fadeIn {
  from {opacity:0; transform: translateY(20px);}
  to {opacity:1; transform: translateY(0);}
}

/* 按钮 */
button {
  margin: 10px;
  padding: 10px 20px;
  border: none;
  border-radius: 20px;
  background: rgba(255,255,255,0.1);
  color: white;
  cursor: pointer;
  position: relative;
  overflow: hidden;
}

/* 点击波纹 */
button::after {
  content: "";
  position: absolute;
  width: 0;
  height: 0;
  background: rgba(255,255,255,0.3);
  border-radius: 50%;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
}

button:active::after {
  width: 200px;
  height: 200px;
  transition: 0.4s;
  opacity: 0;
}
</style>

<script>
function setScene(text, options) {
  const box = document.getElementById("box");
  box.innerHTML = "<p style='line-height:1.8'>" + text + "</p>";

  options.forEach(op => {
    const b = document.createElement("button");
    b.innerText = op.label;
    b.onclick = op.action;
    box.appendChild(b);
  });
}

/* 场景（回到“安慰感”） */

function start() {
  setScene(
    "如果你刚刚有点难过\n\n也不用急着变好",
    [
      {label:"我知道", action:s1},
      {label:"我只是随便看看", action:s2}
    ]
  );
}

function s1() {
  setScene(
    "那就先这样也可以\n\n不用解释\n也不用整理",
    [
      {label:"嗯", action:s3},
      {label:"再待一下", action:idle}
    ]
  );
}

function s2() {
  setScene(
    "有时候随便点进来\n\n其实也不是完全随便",
    [
      {label:"那继续吧", action:s3},
      {label:"还是算了", action:idle}
    ]
  );
}

function s3() {
  setScene(
    "你可以先什么都不做\n\n就待在这里一会",
    [
      {label:"再一会", action:s4},
      {label:"停在这里", action:idle}
    ]
  );
}

function s4() {
  setScene(
    "等你准备好再离开\n\n或者现在就走\n\n都可以",
    [
      {label:"谢谢", action:end},
      {label:"我还在", action:idle}
    ]
  );
}

function idle() {
  setScene(
    "那就先这样\n\n这个页面不会催你",
    [
      {label:"……", action:start}
    ]
  );
}

function end() {
  setScene(
    "其实也没做什么\n\n只是陪你待了一小会",
    [
      {label:"再来一次", action:start}
    ]
  );
}

/* 粒子（柔和版） */
window.onload = function() {
  start();

  let canvas = document.createElement("canvas");
  document.body.appendChild(canvas);
  let ctx = canvas.getContext("2d");

  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  let p = [];
  for(let i=0;i<80;i++){
    p.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,r:Math.random()*2});
  }

  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle="white";
    p.forEach(s=>{
      ctx.globalAlpha = Math.random();
      ctx.beginPath();
      ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
      ctx.fill();
      s.y += 0.2;
      if(s.y>canvas.height)s.y=0;
    });
    requestAnimationFrame(draw);
  }
  draw();
}
</script>

</head>

<body>
<div class="container" id="box"></div>
</body>
</html>
