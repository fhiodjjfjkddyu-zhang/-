<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>端午·光影展</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #050505; font-family: 'Songti SC', 'SimSun', serif; overflow: hidden; color: #fff; user-select: none; }
        #starfield { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        #ui-layer { position: relative; z-index: 10; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .screen { display: none; flex-direction: column; align-items: center; opacity: 0; transition: opacity 1s ease-in-out; position: absolute; }
        .screen.active { display: flex; opacity: 1; }
        h1 { font-size: 3em; letter-spacing: 5px; margin-bottom: 40px; text-shadow: 0 0 20px rgba(255,255,255,0.3); }
        h2 { font-size: 2.2em; color: #d4af37; letter-spacing: 3px; }
        .btn { margin: 15px; padding: 15px 40px; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.3); color: #fff; font-size: 1.2em; cursor: pointer; border-radius: 5px; transition: all 0.3s; backdrop-filter: blur(5px); }
        .btn:hover { background: rgba(255, 255, 255, 0.2); box-shadow: 0 0 15px rgba(255, 255, 255, 0.5); transform: scale(1.05); }
        
        #compass-container { position: relative; width: 300px; height: 300px; display: flex; justify-content: center; align-items: center; border-radius: 50%; border: 2px dashed rgba(212, 175, 55, 0.5); cursor: pointer; transition: transform 4s cubic-bezier(0.1, 0.7, 0.1, 1); box-shadow: 0 0 50px rgba(212, 175, 55, 0.1); }
        #calendar-text { font-size: 2.5em; color: #d4af37; font-weight: bold; text-shadow: 0 0 10px #d4af37; }
        .compass-hint { margin-top: 30px; font-size: 1.2em; color: #888; animation: pulse 2s infinite; }

        #flash-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #fff; z-index: 999; opacity: 0; pointer-events: none; display: none; }
        #final-reveal { font-size: 5em; font-weight: bold; background: linear-gradient(45deg, #ff9a9e, #a18cd1, #8fd3f4); -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: scaleUp 1s ease forwards; opacity: 0; }
        #birthday-msg { font-size: 2em; color: #d4af37; opacity: 0; animation: slideUpFade 1.5s ease forwards 1s; }
        
        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }
        @keyframes scaleUp { to { opacity: 1; transform: scale(1); } }
        @keyframes slideUpFade { to { opacity: 1; transform: translateY(0); } }
        @keyframes flashGold { 0% { display: block; opacity: 1; background: #d4af37; } 100% { opacity: 0; display: none; } }
    </style>
</head>
<body>

    <canvas id="starfield"></canvas>
    <div id="flash-overlay"></div>

    <div id="ui-layer">
        <div id="screen1" class="screen active">
            <h1>端午·光影展</h1>
            <button class="btn" onclick="selectMovie('《屈原》')">选项 1: 《屈原》</button>
            <button class="btn" onclick="selectMovie('《典籍里的中国》')">选项 2: 《典籍里的中国》</button>
            <button class="btn" onclick="selectMovie('《相遇中国》')">选项 3: 《相遇中国》</button>
        </div>

        <div id="screen2" class="screen">
            <h2 id="movie-title"></h2>
            <button class="btn" onclick="goToCompass()">继续探索</button>
        </div>

        <div id="screen3" class="screen">
            <div id="compass-container" onclick="spinCompass()">
                <div id="calendar-text">甲子</div>
            </div>
            <div class="compass-hint">点击启动时空罗盘</div>
        </div>

        <div id="screen4" class="screen">
            <div id="final-reveal">天降俊哲</div>
            <div id="birthday-msg">包氏云旭，年十九满腹经纶</div>
        </div>
    </div>

    <audio id="bgm" src="b.mp3" preload="auto"></audio>

    <script>
        const canvas = document.getElementById('starfield');
        const ctx = canvas.getContext('2d');
        let warpSpeed = 1;
        let stars = [];
        function initStars() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            for (let i = 0; i < 800; i++) stars.push({x: Math.random()*innerWidth-innerWidth/2, y: Math.random()*innerHeight-innerHeight/2, z: Math.random()*innerWidth});
        }
        function drawStars() {
            ctx.fillStyle = 'rgba(5, 5, 5, 0.3)'; ctx.fillRect(0,0,innerWidth,innerHeight);
            ctx.translate(innerWidth/2, innerHeight/2);
            for(let s of stars) {
                s.z -= warpSpeed;
                if(s.z <= 0) s.z = innerWidth;
                let sx = s.x / (s.z/innerWidth), sy = s.y / (s.z/innerWidth);
                ctx.beginPath(); ctx.arc(sx, sy, (1-s.z/innerWidth)*3, 0, Math.PI*2);
                ctx.fillStyle = `rgba(255,255,255,${1-s.z/innerWidth})`; ctx.fill();
            }
            ctx.translate(-innerWidth/2, -innerHeight/2);
            requestAnimationFrame(drawStars);
        }
        initStars(); drawStars();

        function selectMovie(title) { document.getElementById('movie-title').innerText = title; switchScreen('screen1', 'screen2'); }
        function goToCompass() { switchScreen('screen2', 'screen3'); }
        function switchScreen(h, s) { document.getElementById(h).classList.remove('active'); setTimeout(() => document.getElementById(s).classList.add('active'), 500); }

        function spinCompass() {
            const compass = document.getElementById('compass-container');
            compass.style.transform = "rotate(2160deg) scale(1.2)";
            warpSpeed = 15;
            let counter = 0;
            const stems = ["甲子", "乙丑", "丙寅", "丁卯", "戊辰", "己巳", "庚午", "辛未", "壬申", "癸酉", "甲戌", "乙亥"];
            let int = setInterval(() => document.getElementById('calendar-text').innerText = stems[counter++ % 12], 80);
            setTimeout(() => {
                clearInterval(int);
                document.getElementById('calendar-text').innerText = "丙戌年甲午月丙子日";
                setTimeout(triggerSurprise, 1000);
            }, 4000);
        }

        function triggerSurprise() {
            document.getElementById('flash-overlay').style.animation = 'flashGold 2s ease-out forwards';
            document.getElementById('bgm').play();
            warpSpeed = 0.5;
            switchScreen('screen3', 'screen4');
        }
    </script>
</body>
</html>
