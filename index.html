<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>给慧靖的一个安静角落</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: #121619; /* 深沉宁静的背景色 */
            color: #EAEAEA;
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            overflow: hidden;
            text-align: center;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 300;
            letter-spacing: 2px;
            margin-bottom: 40px;
            color: #C0C8D0;
        }

        /* 呼吸光球动画 */
        .breathe-circle {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(136, 171, 194, 0.8) 0%, rgba(136, 171, 194, 0) 70%);
            box-shadow: 0 0 40px rgba(136, 171, 194, 0.4);
            animation: breathe 8s ease-in-out infinite;
            margin-bottom: 50px;
        }

        @keyframes breathe {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.6); opacity: 1; }
        }

        .instruction {
            font-size: 0.9rem;
            color: #7A8B99;
            margin-bottom: 30px;
            letter-spacing: 1px;
        }

        .message-box {
            min-height: 60px;
            max-width: 80%;
            font-size: 1.1rem;
            line-height: 1.6;
            color: #D3DDE6;
            margin-bottom: 30px;
            transition: opacity 0.5s ease;
        }

        button {
            background-color: transparent;
            border: 1px solid #7A8B99;
            color: #C0C8D0;
            padding: 10px 24px;
            border-radius: 20px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 1px;
        }

        button:hover {
            background-color: #7A8B99;
            color: #121619;
        }
    </style>
</head>
<body>

    <h1>慧靖，欢迎来到你的专属休息站</h1>
    
    <div class="instruction">跟着光球的节奏，深呼吸</div>

    <div class="breathe-circle"></div>

    <div class="message-box" id="message">
        今天辛苦啦，先放下烦心事，允许自己在这里安静一会儿吧。
    </div>

    <button onclick="changeMessage()">点击抽取一张朋友的字条</button>

    <script>
        // 这里是你作为朋友，想对她说的话（可以自行修改或增加）
        const messages = [
            "不用逼着自己一直坚强，偶尔觉得累是完全正常的。",
            "无论遇到什么麻烦，别忘了你身边还有朋友在支持你。",
            "去泡杯热茶，听一首舒缓的古典乐，今晚什么都别想了。",
            "有时候问题暂时解不开也没关系，时间会给出答案的。",
            "你已经做得很好了，现在你需要的是好好休息一下。",
            "如果觉得世界太吵，就在这里多待一会儿。",
            "明天的事情明天再说，今天先照顾好自己的情绪。"
        ];

        function changeMessage() {
            const msgElement = document.getElementById('message');
            // 淡出
            msgElement.style.opacity = 0;
            
            setTimeout(() => {
                // 随机选择一条与当前不同的消息
                let randomIndex;
                let newMessage;
                do {
                    randomIndex = Math.floor(Math.random() * messages.length);
                    newMessage = messages[randomIndex];
                } while (newMessage === msgElement.innerText);
                
                msgElement.innerText = newMessage;
                // 淡入
                msgElement.style.opacity = 1;
            }, 500); // 等待淡出动画完成
        }
    </script>

</body>
</html>
